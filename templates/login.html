<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoanTrack — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14; --surface: #141720; --surface2: #1c2030;
  --border: #252a3a; --accent: #00d4ff; --text: #e8eaf0; --text2: #8892a4;
  --danger: #ef4444; --mono: 'Space Mono', monospace; --sans: 'DM Sans', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-grid {
  position: absolute; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}
.bg-glow {
  position: absolute; width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,.06) 0%, transparent 70%);
  top: -100px; left: -100px; z-index: 0;
}
.login-box {
  position: relative; z-index: 1;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px; width: 100%; max-width: 400px;
  box-shadow: 0 32px 80px rgba(0,0,0,.5);
}
.login-header { text-align: center; margin-bottom: 36px; }
.logo-badge {
  font-family: var(--mono); font-size: 10px; color: var(--accent);
  background: rgba(0,212,255,.1); border: 1px solid rgba(0,212,255,.3);
  padding: 4px 12px; border-radius: 4px; letter-spacing: 2px;
  display: inline-block; margin-bottom: 16px;
}
.login-header h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
.login-header p { color: var(--text2); font-size: 14px; }
.form-group { margin-bottom: 18px; }
label { display: block; font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text); font-size: 14px;
  font-family: var(--sans); outline: none; transition: border-color .15s;
}
input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,.1); }
.btn-login {
  width: 100%; background: var(--accent); color: #000; border: none;
  border-radius: 10px; padding: 13px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: var(--sans); transition: background .15s;
  margin-top: 8px;
}
.btn-login:hover { background: #00bbdd; }
.error-msg {
  background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3);
  color: var(--danger); border-radius: 8px; padding: 10px 14px;
  font-size: 13px; margin-bottom: 18px;
}

</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="login-box">
  <div class="login-header">
    <div class="logo-badge">IT DEPT</div>
    <h1>LoanTrack</h1>
    <p>Laptop Asset Management System</p>
  </div>
  {% with msgs = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in msgs %}
  <div class="error-msg">⚠ {{ msg }}</div>
  {% endfor %}
  {% endwith %}
  <form method="post">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autofocus required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>
    </div>
    <button type="submit" class="btn-login">Sign In →</button>
  </form>

</div>
</body>
</html>
